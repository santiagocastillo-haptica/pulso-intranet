    <form id="login-form">
      <div class="form-group">
        <label for="login-email">Correo electrónico</label>
        <input type="email" id="login-email" placeholder="usuario@empresa.com" required autocomplete="email">
      </div>
      <div class="form-group">
        <label for="login-password">Contraseña</label>
        <input type="password" id="login-password" placeholder="••••••••" required autocomplete="current-password">
      </div>
      <div id="login-error" class="alert-error hidden"></div>
      <button type="submit" class="btn btn-primary btn-full">Ingresar al Sistema</button>
    </form>
